[tools]
rust = "1.92.0"

[tasks.fmt]
description = "Format Rust sources"
run = "cargo fmt"

[tasks.test]
description = "Run unit tests"
run = "cargo test"

[tasks.check]
description = "Run cargo check"
run = "cargo check"

[tasks.test-zellij]
description = "Run docker-based zellij integration tests"
run = """
cargo build --locked
read -r ZELLIJ_TAG ZELLIJ_SHA256 < ZELLIJ_VERSION
docker build -f Dockerfile.test --build-arg ZELLIJ_TAG=$ZELLIJ_TAG --build-arg ZELLIJ_SHA256=$ZELLIJ_SHA256 -t ai-teamlead-zellij-test .
docker run --rm -v \"$PWD/target/debug/ai-teamlead:/test/bin/ai-teamlead:ro\" -v \"$PWD/tests/integration:/test/tests:ro\" -v \"$PWD/templates:/test/bin/templates:ro\" ai-teamlead-zellij-test /test/tests/docker-test-runner.sh
"""
